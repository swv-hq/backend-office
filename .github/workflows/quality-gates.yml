name: Quality Gates

# BO-SPEC-032.AC23: Every PR runs the project's full quality gate
# (lint, typecheck, format, build, per-workspace tests, spec coverage)
# and fails fast on the first issue.
#
# Sequential single-job design (per BO-SPEC-032 §"Quality Gates Workflow"):
# cheapest checks (lint/typecheck) run first so they fail before the more
# expensive ones (build/tests).

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    name: Lint, typecheck, format, build, test, spec-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}" --ignore-path .gitignore

      - name: Build
        # CI only needs the web build to typecheck/compile — it never connects
        # to a real backend. Provide placeholder env vars so the Next.js
        # prerender doesn't crash on module-init code that asserts these are
        # set (ConvexReactClient + ClerkProvider).
        # Per-PR builds with the real per-PR Convex URL happen in Vercel
        # (Slices 2 + 3), not in this workflow.
        env:
          NEXT_PUBLIC_CONVEX_URL: https://placeholder-ci.convex.cloud
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_aGVsbG8taS1hbS1mYWtlLmNsZXJrLmFjY291bnRzLmRldiQ
          CLERK_SECRET_KEY: sk_test_placeholder_ci_only
        run: npm run build

      - name: Test — backend (Convex)
        working-directory: packages/backend-office-backend
        run: npm test

      - name: Test — web
        working-directory: apps/backend-office-web
        run: npm test

      - name: Test — native
        working-directory: apps/backend-office-native
        run: npm test

      - name: Spec coverage (strict)
        run: npm run test:spec-coverage:strict
